services:
  tool:
    build:
      context: .
      dockerfile: Dockerfile
    image: openapi-test-tool:dev
    container_name: openapi-test-tool
    working_dir: /app
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./samples:/app/samples
      - ./reports:/app/reports
    command:
      - --spec
      - samples/sample_openapi.yaml
      - --base-url
      - http://localhost:8000
      - --output
      - reports
