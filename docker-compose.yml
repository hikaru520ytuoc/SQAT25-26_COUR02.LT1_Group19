services:
  demo-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: openapi-test-tool:dev
    container_name: openapi-demo-api
    working_dir: /app
    entrypoint:
      - uvicorn
      - demo_api.app:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  tool:
    build:
      context: .
      dockerfile: Dockerfile
    image: openapi-test-tool:dev
    container_name: openapi-test-tool
    working_dir: /app
    environment:
      PYTHONUNBUFFERED: "1"
    depends_on:
      demo-api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./samples:/app/samples
      - ./reports:/app/reports
    command:
      - --spec
      - samples/sample_openapi.yaml
      - --base-url
      - http://demo-api:8000
      - --output
      - reports
